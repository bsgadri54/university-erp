<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Management</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            padding:25px;
        }

        .container{
            max-width:1400px;
            margin:auto;
        }

        /* Header */

        .header{
            background:white;
            padding:25px;
            border-radius:15px;
            text-align:center;
            margin-bottom:25px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .header h1{
            color:#16213e;
            margin-bottom:8px;
        }

        .header p{
            color:#666;
        }

        /* Statistics */

        .stats{
            display:grid;
            grid-template-columns:
        repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-bottom:25px;
        }

        .stat-card{
            background:white;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .stat-card h3{
            color:#555;
            margin-bottom:10px;
        }

        .stat-card h2{
            font-size:38px;
            color:#1565c0;
        }

        .pass-card h2{
            color:#2e7d32;
        }

        .fail-card h2{
            color:#d32f2f;
        }

        /* Search */

        .search-box{
            background:white;
            padding:20px;
            border-radius:15px;
            margin-bottom:25px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .search-box input{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
        }

        .search-box input:focus{
            outline:none;
            border-color:#667eea;
        }

        /* Table */

        .table-container{
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:#667eea;
            color:white;
        }

        th{
            padding:15px;
            text-align:center;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #eee;
        }

        tbody tr:hover{
            background:#f5f7ff;
        }

        /* Status */

        .pass{
            color:#2e7d32;
            font-weight:bold;
        }

        .fail{
            color:#d32f2f;
            font-weight:bold;
        }

        /* Buttons */

        .edit-btn{
            background:#2e7d32;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:6px;
            cursor:pointer;
            margin-right:5px;
        }

        .edit-btn:hover{
            background:#1b5e20;
        }

        .delete-btn{
            background:#d32f2f;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:6px;
            cursor:pointer;
        }

        .delete-btn:hover{
            background:#b71c1c;
        }

        /* Bottom Buttons */

        .button-section{
            margin-top:25px;
            display:flex;
            gap:15px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .dashboard-btn,
        .refresh-btn{
            border:none;
            color:white;
            padding:12px 24px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        .dashboard-btn{
            background:#1565c0;
        }

        .refresh-btn{
            background:#2e7d32;
        }

        .dashboard-btn:hover,
        .refresh-btn:hover{
            transform:translateY(-2px);
        }

        /* Mobile */

        @media(max-width:768px){

            body{
                padding:15px;
            }

            table{
                display:block;
                overflow-x:auto;
                white-space:nowrap;
            }

            .stats{
                grid-template-columns:1fr;
            }
        }

    </style>

</head>
<body>

<div class="container">

    <!-- Header -->

    <div class="header">

        <h1>🎓 Result Management</h1>

        <p>
            University ERP Examination Module
        </p>

    </div>

    <!-- Statistics -->

    <div class="stats">

        <div class="stat-card">

            <h3>Total Results</h3>

            <h2 id="totalResults">0</h2>

        </div>

        <div class="stat-card pass-card">

            <h3>Pass Subjects</h3>

            <h2 id="passCount">0</h2>

        </div>

        <div class="stat-card fail-card">

            <h3>Fail Subjects</h3>

            <h2 id="failCount">0</h2>

        </div>

    </div>

    <!-- Search Box -->

    <div class="search-box">

        <input
                type="text"
                id="search"
                placeholder="🔍 Search Enrollment Number"
                onkeyup="loadResults()">

    </div>

    <!-- Results Table -->

    <div class="table-container">

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Enrollment No</th>

                <th>Subject</th>

                <th>Marks</th>

                <th>Maximum</th>

                <th>Status</th>

                <th>Semester</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="resultTable">

            </tbody>

        </table>

    </div>

    <!-- Buttons -->

    <div class="button-section">

        <button
                class="dashboard-btn"
                onclick="window.location.href='dashboard.html'">

            ⬅ Back To Dashboard

        </button>

        <button
                class="refresh-btn"
                onclick="loadResults()">

            🔄 Refresh

        </button>

    </div>

</div>

<script>

    window.onload = loadResults;

    function loadResults(){

        let search =
            document.getElementById("search")
                .value
                .toLowerCase();

        fetch("https://university-erp-1-gac1.onrender.com/results")

            .then(response => response.json())

            .then(data => {

                let rows = "";

                let totalResults = 0;
                let passCount = 0;
                let failCount = 0;

                data.forEach(result => {

                    if(
                        search !== "" &&
                        !result.enrollmentNo
                            .toLowerCase()
                            .includes(search)
                    ){
                        return;
                    }

                    totalResults++;

                    let maxMarks = 100;
                    let passMarks = 40;

                    if(
                        result.subject.includes("LAB") ||
                        result.subject ===
                        "Practical Training 45 Days"
                    ){
                        maxMarks = 50;
                        passMarks = 20;
                    }

                    let status =
                        result.marks >= passMarks
                            ? "PASS"
                            : "FAIL";

                    if(status === "PASS"){
                        passCount++;
                    }else{
                        failCount++;
                    }

                    rows += `
                <tr>

                    <td>${result.id}</td>

                    <td>${result.enrollmentNo}</td>

                    <td>${result.subject}</td>

                    <td>${result.marks}</td>

                    <td>${maxMarks}</td>

                    <td class="${
                        status === "PASS"
                            ? "pass"
                            : "fail"
                    }">
                        ${status}
                    </td>

                    <td>${result.semester}</td>

                    <td>

                        <button
                            class="edit-btn"
                            onclick="editResult(
                                ${result.id},
                                ${result.marks}
                            )">

                            Edit

                        </button>

                        <button
                            class="delete-btn"
                            onclick="deleteResult(
                                ${result.id}
                            )">

                            Delete

                        </button>

                    </td>

                </tr>
                `;
                });

                document.getElementById(
                    "resultTable"
                ).innerHTML = rows;

                document.getElementById(
                    "totalResults"
                ).innerHTML = totalResults;

                document.getElementById(
                    "passCount"
                ).innerHTML = passCount;

                document.getElementById(
                    "failCount"
                ).innerHTML = failCount;
            })

            .catch(error => {

                console.error(error);

                alert(
                    "Error Loading Results"
                );

            });
    }

    /* =========================
       Edit Result
    ========================= */

    function editResult(
        id,
        currentMarks
    ){

        let newMarks =
            prompt(
                "Enter New Marks",
                currentMarks
            );

        if(
            newMarks === null ||
            newMarks === ""
        ){
            return;
        }

        fetch(
            "https://university-erp-1-gac1.onrender.com/results/" + id,
            {
                method:"PUT",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    marks:newMarks
                })
            }
        )

            .then(response => {

                if(!response.ok){
                    throw new Error(
                        "Update Failed"
                    );
                }

                return response.text();
            })

            .then(message => {

                alert(
                    message ||
                    "Marks Updated Successfully"
                );

                loadResults();

            })

            .catch(error => {

                console.error(error);

                alert(
                    "Unable To Update Marks"
                );

            });
    }

    /* =========================
       Delete Result
    ========================= */

    function deleteResult(id){

        if(
            !confirm(
                "Are you sure you want to delete this result?"
            )
        ){
            return;
        }

        fetch(
            "https://university-erp-1-gac1.onrender.com/results/" + id,
            {
                method:"DELETE"
            }
        )

            .then(response => {

                if(!response.ok){
                    throw new Error(
                        "Delete Failed"
                    );
                }

                return response.text();
            })

            .then(message => {

                alert(
                    message ||
                    "Result Deleted Successfully"
                );

                loadResults();

            })

            .catch(error => {

                console.error(error);

                alert(
                    "Unable To Delete Result"
                );

            });
    }

</script>

</body>
</html>
