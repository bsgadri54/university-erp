<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Report</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .container{
            max-width:1000px;
            margin:50px auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card h1{
            color:#16213e;
            margin-bottom:15px;
        }

        .card p{
            color:#666;
            font-size:18px;
            margin-bottom:25px;
        }

        .btn{
            background:#1abc9c;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#16a085;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card">

        <h1>Attendance Report</h1>

        <p>
            Attendance report module is currently under development.
        </p>

        <button type="button" class="btn" onclick="goDashboard()">
            Back to Dashboard
        </button>

        <script>
            function goDashboard() {

                let role = localStorage.getItem("role");

                if(role === "ADMIN"){
                    window.location.href = "dashboard.html";
                }
                else if(role === "EMPLOYEE"){
                    window.location.href = "employee-dashboard.html";
                }
                else if(role === "STUDENT"){
                    window.location.href = "student-dashboard.html";
                }
                else{
                    alert("Role not found. Please login again.");
                }
            }
        </script>

    </div>

</div>

</body>
</html>
