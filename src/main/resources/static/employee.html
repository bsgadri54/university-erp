<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            padding:30px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        h2{
            color:#333;
            margin-top:30px;
        }

        .form-group{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:15px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 8px rgba(102,126,234,0.4);
        }

        .button-group{
            margin-top:20px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
            font-size:14px;
            margin-right:10px;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .save-btn{
            background:#667eea;
            color:white;
        }

        .load-btn{
            background:#28a745;
            color:white;
        }

        .edit-btn{
            background:#ffc107;
            color:black;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        thead{
            background:#667eea;
            color:white;
        }

        th,td{
            padding:12px;
            text-align:center;
        }

        tbody tr{
            border-bottom:1px solid #eee;
        }

        tbody tr:hover{
            background:#f5f7ff;
        }

        .action-buttons{
            display:flex;
            justify-content:center;
            gap:8px;
        }

        @media(max-width:768px){
            body{
                padding:15px;
            }

            .container{
                padding:20px;
            }

            table{
                display:block;
                overflow-x:auto;
                white-space:nowrap;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>👨‍💼 Employee Management System</h1>

    <input type="hidden" id="employeeId">

    <div class="form-group">

        <input type="text" id="employeeCode" placeholder="Employee Code">

        <input type="text" id="employeeName" placeholder="Employee Name">

        <input type="text" id="designation" placeholder="Designation">

        <input type="text" id="department" placeholder="Department">

    </div>

    <div class="button-group">
        <button class="save-btn" onclick="saveEmployee()">💾 Save Employee</button>
        <button class="load-btn" onclick="loadEmployees()">🔄 Refresh</button>
    </div>

    <h2>Employees List</h2>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Employee Code</th>
            <th>Name</th>
            <th>Designation</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="employeeBody"></tbody>

    </table>

</div>

<script>

    window.onload = function(){
        loadEmployees();
    }

    function saveEmployee(){

        let id = document.getElementById("employeeId").value;

        let employee = {
            employeeCode: document.getElementById("employeeCode").value,
            name: document.getElementById("employeeName").value,
            designation: document.getElementById("designation").value,
            department: document.getElementById("department").value
        };

        if(id){

            fetch("/employees/" + id,{
                method:"PUT",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(employee)
            })
                .then(response=>response.json())
                .then(data=>{

                    alert("Employee Updated Successfully");

                    clearForm();
                    loadEmployees();
                });

        }else{

            fetch("/employees",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(employee)
            })
                .then(response=>response.json())
                .then(data=>{

                    alert("Employee Added Successfully");

                    clearForm();
                    loadEmployees();
                });
        }
    }

    function loadEmployees(){

        fetch("/employees")
            .then(response=>response.json())
            .then(data=>{

                let rows="";

                data.forEach(employee=>{

                    rows += `
            <tr>
                <td>${employee.id}</td>
                <td>${employee.employeeCode}</td>
                <td>${employee.name}</td>
                <td>${employee.designation}</td>
                <td>${employee.department}</td>

                <td>
                    <div class="action-buttons">

                        <button class="edit-btn"
                        onclick="editEmployee(
                        '${employee.id}',
                        '${employee.employeeCode}',
                        '${employee.name}',
                        '${employee.designation}',
                        '${employee.department}')">
                        Edit
                        </button>

                        <button class="delete-btn"
                        onclick="deleteEmployee(${employee.id})">
                        Delete
                        </button>

                    </div>
                </td>

            </tr>
            `;
                });

                document.getElementById("employeeBody").innerHTML = rows;
            });
    }

    function editEmployee(id, code, name, designation, department){

        document.getElementById("employeeId").value = id;
        document.getElementById("employeeCode").value = code;
        document.getElementById("employeeName").value = name;
        document.getElementById("designation").value = designation;
        document.getElementById("department").value = department;
    }

    function deleteEmployee(id){

        if(!confirm("Are you sure you want to delete this employee?")){
            return;
        }

        fetch("/employees/" + id,{
            method:"DELETE"
        })
            .then(response=>response.text())
            .then(data=>{

                alert(data);

                loadEmployees();
            });
    }

    function clearForm(){

        document.getElementById("employeeId").value = "";
        document.getElementById("employeeCode").value = "";
        document.getElementById("employeeName").value = "";
        document.getElementById("designation").value = "";
        document.getElementById("department").value = "";
    }

</script>

</body>
</html>
