<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .header{
            background:linear-gradient(135deg,#1565c0,#42a5f5);
            color:white;
            padding:30px;
            text-align:center;
        }

        .container{
            padding:25px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .card h3{
            color:#666;
            margin-bottom:10px;
        }

        .card h1{
            color:#1565c0;
        }

        .profile{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            margin-bottom:25px;
        }

        .profile h2{
            margin-bottom:15px;
        }

        .menu{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .menu-card{
            background:white;
            padding:25px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            transition:.3s;
        }

        .menu-card:hover{
            transform:translateY(-5px);
        }

        .menu-card a{
            text-decoration:none;
            color:#1565c0;
            font-weight:bold;
        }

        .logout{
            background:red;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
        }

    </style>

</head>
<body>

<div class="header">
    <h1>Student Dashboard</h1>
    <h3 id="welcome"></h3>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h3>Attendance</h3>
            <h1>92%</h1>
        </div>

        <div class="card">
            <h3>Semester</h3>
            <h1 id="semester">-</h1>
        </div>

        <div class="card">
            <h3>Fees Status</h3>
            <h1>Paid</h1>
        </div>

        <div class="card">
            <h3>Course</h3>
            <h1 id="course">-</h1>
        </div>

    </div>

    <div class="profile">

        <h2>My Profile</h2>

        <p><b>Name:</b> <span id="studentName"></span></p>
        <p><b>Enrollment:</b> <span id="username"></span></p>
        <p><b>Course:</b> <span id="studentCourse"></span></p>
        <p><b>Semester:</b> <span id="studentSemester"></span></p>
        <p><b>Email:</b> <span id="studentEmail"></span></p>
        <p><b>Role:</b> Student</p>

    </div>

    <div class="menu">

        <div class="menu-card">
            <a href="profile.html">My Profile</a>
        </div>

        <div class="menu-card">
            <a href="attendance.html">Attendance</a>
        </div>

        <div class="menu-card">
            <a href="reports.html">Results</a>
        </div>

        <div class="menu-card">
            <a href="student.html">Course Details</a>
        </div>

    </div>

    <button class="logout" onclick="logout()">
        Logout
    </button>

</div>

<script>

    let username = localStorage.getItem("username");

    document.getElementById("welcome").innerHTML =
        "Welcome " + username;

    document.getElementById("username").innerHTML =
        username;

    fetch("/students")
        .then(res => res.json())
        .then(data => {

            let student = data.find(
                s => s.enrollmentNo === username
            );

            if(student){

                document.getElementById("studentName").innerHTML =
                    student.name;

                document.getElementById("studentCourse").innerHTML =
                    student.course;

                document.getElementById("studentSemester").innerHTML =
                    student.semester;

                document.getElementById("studentEmail").innerHTML =
                    student.email;

                document.getElementById("semester").innerHTML =
                    student.semester;

                document.getElementById("course").innerHTML =
                    student.course;
            }

        });

    function logout(){
        localStorage.clear();
        window.location.href="login.html";
    }

</script>

</body>
</html>
