<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Results</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#1565c0;
            color:white;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            background:#1565c0;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div class="card">

    <h1>My Results</h1>

    <table>

        <thead>
        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Semester</th>
        </tr>
        </thead>

        <tbody id="resultBody">
        </tbody>

    </table>

    <button onclick="goDashboard()">
        Back To Dashboard
    </button>

</div>

<script>

    let username =
        localStorage.getItem("username");

    fetch("/results/" + username)

        .then(res => res.json())

        .then(data => {

            let html = "";

            data.forEach(r => {

                html += `
        <tr>
            <td>${r.subject}</td>
            <td>${r.marks}</td>
            <td>${r.semester}</td>
        </tr>
        `;
            });

            document.getElementById(
                "resultBody"
            ).innerHTML = html;
        });

    function goDashboard(){

        let role =
            localStorage.getItem("role");

        if(role==="STUDENT"){
            window.location.href =
                "student-dashboard.html";
        }
    }

</script>

</body>
</html>
