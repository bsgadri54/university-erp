<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#5b7cfa,#7a4fcf);
            min-height:100vh;
            padding:50px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            font-size:45px;
            color:#222;
        }

        .top-bar{
            margin-bottom:20px;
        }

        .dashboard-btn{
            background:#16a34a;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .form{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:15px;
            margin-bottom:20px;
        }

        input,select{
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
        }

        .save-btn{
            background:#4f6df5;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            margin-bottom:25px;
        }

        h3{
            margin-bottom:15px;
            font-size:35px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:12px;
        }

        th{
            background:#5c74df;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            border-bottom:1px solid #eee;
            text-align:center;
        }

        .edit{
            background:#ffc107;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .delete{
            background:#f44336;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <button class="dashboard-btn"
                onclick="window.location.href='dashboard.html'">
            🏠 Dashboard
        </button>
    </div>

    <h2> 👤  User Management</h2>

    <input type="hidden" id="userId">

    <div class="form">

        <input type="text" id="username" placeholder="Username">

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">

        <select id="role">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
        </select>

    </div>

    <button class="save-btn" onclick="saveUser()">
        💾 Save User
    </button>

    <h3>Users List</h3>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="userTable"></tbody>

    </table>

</div>

<script>

    loadUsers();

    function saveUser(){

        let id=document.getElementById("userId").value;

        let user={
            username:document.getElementById("username").value,
            email:document.getElementById("email").value,
            password:document.getElementById("password").value,
            role:document.getElementById("role").value
        };

        let url=id==""?"/users/create":"/users/"+id;
        let method=id==""?"POST":"PUT";

        fetch(url,{
            method:method,
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        })
            .then(res=>res.json())
            .then(()=>{

                alert(id==""?"User Created":"User Updated");

                clearForm();
                loadUsers();

            });

    }

    function loadUsers(){

        fetch("/users")
            .then(res=>res.json())
            .then(data=>{

                let rows="";

                data.forEach(user=>{

                    rows+=`
                <tr>

                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${user.role}</td>

                    <td>

                        <button class="edit"
                        onclick="editUser(
                        '${user.id}',
                        '${user.username}',
                        '${user.email}',
                        '${user.password}',
                        '${user.role}'
                        )">
                        Edit
                        </button>

                        <button class="delete"
                        onclick="deleteUser(${user.id})">
                        Delete
                        </button>

                    </td>

                </tr>
                `;
                });

                document.getElementById("userTable").innerHTML=rows;

            });

    }

    function editUser(id,username,email,password,role){

        document.getElementById("userId").value=id;
        document.getElementById("username").value=username;
        document.getElementById("email").value=email;
        document.getElementById("password").value=password;
        document.getElementById("role").value=role;

    }

    function deleteUser(id){

        if(confirm("Delete User?")){

            fetch("/users/"+id,{
                method:"DELETE"
            })
                .then(()=>{

                    alert("User Deleted");
                    loadUsers();

                });

        }

    }

    function clearForm(){

        document.getElementById("userId").value="";
        document.getElementById("username").value="";
        document.getElementById("email").value="";
        document.getElementById("password").value="";
        document.getElementById("role").value="USER";

    }

</script>

</body>
</html>
