<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marks Entry</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .container{
            width:600px;
            margin:50px auto;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#16213e;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        select,
        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            background:#1abc9c;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#16a085;
        }

        .back-btn{
            background:#1565c0;
        }

        .back-btn:hover{
            background:#0d47a1;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Marks Entry</h1>

        <label>Select Student</label>
        <select id="studentSelect">
            <option value="">Select Student</option>
        </select>

        <label>Subject</label>
        <select id="subject">
            <option value="">Select Subject</option>

            <option>Computer Network</option>
            <option>Data Base Management System</option>
            <option>Microprocessor and Interfacing</option>
            <option>Computer System Architecture</option>
            <option>PC Maintenance and Trouble Shooting</option>
            <option>Object Oriented Programming through C++</option>
            <option>Software Engineering</option>
            <option>Microprocessor and Interfacing LAB</option>
            <option>Data Base Management System LAB</option>
            <option>PC Maintenance and Trouble Shooting LAB</option>
            <option>Object Oriented Programming through C++ LAB</option>
            <option>English & Communication Skills-4 LAB</option>
            <option>Practical Training 45 Days</option>
        </select>

        <label>Marks</label>
        <input type="number" id="marks" placeholder="Enter Marks">

        <label>Semester</label>
        <select id="semester">
            <option value="SEM 4" selected>SEM 4</option>
        </select>

        <button onclick="saveMarks()">
            Save Marks
        </button>

        <button class="back-btn" onclick="goDashboard()">
            Back To Dashboard
        </button>

    </div>

</div>

<script>

    fetch("/students")
        .then(res => res.json())
        .then(data => {

            let select =
                document.getElementById("studentSelect");

            data.forEach(student => {

                select.innerHTML += `
            <option value="${student.enrollmentNo}">
                ${student.name} (${student.enrollmentNo})
            </option>
        `;
            });

        });

    function saveMarks(){

        let enrollmentNo =
            document.getElementById("studentSelect").value;

        let subject =
            document.getElementById("subject").value;

        let marks =
            document.getElementById("marks").value;

        let semester =
            document.getElementById("semester").value;

        if(
            enrollmentNo === "" ||
            subject === "" ||
            marks === "" ||
            semester === ""
        ){
            alert("Please fill all fields");
            return;
        }

        fetch("/results",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                enrollmentNo:enrollmentNo,
                subject:subject,
                marks:marks,
                semester:semester
            })
        })
            .then(res => res.json())
            .then(data => {

                alert("Marks Saved Successfully");

                document.getElementById("subject").value="";
                document.getElementById("marks").value="";
                document.getElementById("semester").value="";
            });
    }

    function goDashboard(){

        let role = localStorage.getItem("role");

        if(role === "ADMIN"){
            window.location.href = "dashboard.html";
        }
        else if(role === "EMPLOYEE"){
            window.location.href = "employee-dashboard.html";
        }
    }

</script>

</body>
</html>
