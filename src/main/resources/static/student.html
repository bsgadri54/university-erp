<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            padding:30px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        h2{
            color:#333;
            margin-top:30px;
        }

        .form-group{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:15px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 8px rgba(102,126,234,0.4);
        }

        .button-group{
            margin-top:20px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            margin-right:10px;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .save-btn{
            background:#667eea;
            color:white;
        }

        .load-btn{
            background:#28a745;
            color:white;
        }

        .edit-btn{
            background:#ffc107;
            color:black;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            overflow:hidden;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        thead{
            background:#667eea;
            color:white;
        }

        th,td{
            padding:12px;
            text-align:center;
        }

        tbody tr{
            border-bottom:1px solid #eee;
        }

        tbody tr:hover{
            background:#f5f7ff;
        }

        .action-buttons{
            display:flex;
            justify-content:center;
            gap:8px;
        }

        @media(max-width:768px){

            body{
                padding:15px;
            }

            .container{
                padding:20px;
            }

            table{
                display:block;
                overflow-x:auto;
                white-space:nowrap;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🎓 Student Management System</h1>

    <input type="hidden" id="studentId">

    <div class="form-group">

        <input type="text" id="enrollmentNo" placeholder="Enrollment Number">

        <input type="text" id="name" placeholder="Student Name">

        <input type="email" id="email" placeholder="Email Address">

        <input type="text" id="phone" placeholder="Phone Number">

        <input type="text" id="course" placeholder="Course">

        <input type="number" id="semester" placeholder="Semester">

    </div>

    <div class="button-group">
        <button class="save-btn" onclick="addStudent()">💾 Save Student</button>
        <button class="load-btn" onclick="loadStudents()">🔄 Refresh</button>
    </div>

    <h2>Students List</h2>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Enrollment No</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Course</th>
            <th>Semester</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="studentBody"></tbody>

    </table>

</div>

<script>

    let editingId = null;

    window.onload = function(){
        loadStudents();
    }

    function loadStudents(){

        fetch("/students")
            .then(response => response.json())
            .then(data => {

                let rows = "";

                data.forEach(student => {

                    rows += `
            <tr>
                <td>${student.id}</td>
                <td>${student.enrollmentNo}</td>
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td>${student.phone}</td>
                <td>${student.course}</td>
                <td>${student.semester}</td>

                <td>
                    <div class="action-buttons">

                        <button class="edit-btn"
                        onclick="editStudent(${student.id})">
                        Edit
                        </button>

                        <button class="delete-btn"
                        onclick="deleteStudent(${student.id})">
                        Delete
                        </button>

                    </div>
                </td>
            </tr>
            `;
                });

                document.getElementById("studentBody").innerHTML = rows;
            });
    }

    function addStudent(){

        let student = {

            enrollmentNo: document.getElementById("enrollmentNo").value,
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            course: document.getElementById("course").value,
            semester: document.getElementById("semester").value
        };

        if(editingId != null){

            fetch("/students/" + editingId,{
                method:"PUT",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(student)
            })
                .then(response=>response.json())
                .then(data=>{

                    alert("Student Updated Successfully");

                    editingId = null;

                    clearForm();

                    loadStudents();
                });

        }else{

            fetch("/students",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(student)
            })
                .then(response=>response.json())
                .then(data=>{

                    alert("Student Added Successfully");

                    clearForm();

                    loadStudents();
                });
        }
    }

    function editStudent(id){

        fetch("/students/" + id)
            .then(response => response.json())
            .then(student => {

                document.getElementById("enrollmentNo").value = student.enrollmentNo;
                document.getElementById("name").value = student.name;
                document.getElementById("email").value = student.email;
                document.getElementById("phone").value = student.phone;
                document.getElementById("course").value = student.course;
                document.getElementById("semester").value = student.semester;

                editingId = student.id;
            });
    }

    function deleteStudent(id){

        if(!confirm("Are you sure you want to delete this student?")){
            return;
        }

        fetch("/students/" + id,{
            method:"DELETE"
        })
            .then(response => response.text())
            .then(data => {

                alert(data);

                loadStudents();
            });
    }

    function clearForm(){

        document.getElementById("enrollmentNo").value = "";
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("course").value = "";
        document.getElementById("semester").value = "";
    }

</script>

</body>
</html>
