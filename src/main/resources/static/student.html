<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .container{
            width:95%;
            max-width:1400px;
            margin:25px auto;
        }

        .header{
            background:linear-gradient(135deg,#1565c0,#42a5f5);
            color:white;
            text-align:center;
            padding:25px;
            border-radius:12px;
            margin-bottom:20px;
            box-shadow:0 3px 12px rgba(0,0,0,.15);
        }

        .header h1{
            margin-bottom:5px;
        }

        .form-card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            margin-bottom:20px;
        }

        .form-card h2{
            color:#1565c0;
            margin-bottom:20px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#333;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        input:focus,
        select:focus{
            border-color:#1565c0;
        }

        .photo-preview{
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .photo-preview img{
            width:120px;
            height:120px;
            border-radius:50%;
            border:3px solid #1565c0;
            object-fit:cover;
        }

        .button-group{
            margin-top:20px;
            display:flex;
            gap:15px;
        }

        .save-btn{
            background:#2e7d32;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        .save-btn:hover{
            background:#1b5e20;
        }

        .clear-btn{
            background:#ef6c00;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        .clear-btn:hover{
            background:#e65100;
        }

        .search-card{
            background:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .search-card input{
            width:100%;
            padding:14px;
        }

        .table-card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:#1565c0;
            color:white;
        }

        th,
        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #eee;
        }

        tbody tr:hover{
            background:#f5f8ff;
        }

        .student-img{
            width:50px;
            height:50px;
            border-radius:50%;
            object-fit:cover;
        }

        .edit-btn{
            background:#2e7d32;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            margin-right:5px;
        }

        .delete-btn{
            background:#d32f2f;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
        }

        .edit-btn:hover{
            background:#1b5e20;
        }

        .delete-btn:hover{
            background:#b71c1c;
        }

        .footer-btn{
            margin-top:20px;
        }

        .dashboard-btn{
            background:#1565c0;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
        }

        .dashboard-btn:hover{
            background:#0d47a1;
        }

        @media(max-width:768px){

            .button-group{
                flex-direction:column;
            }

            table{
                display:block;
                overflow-x:auto;
            }
        }

    </style>

</head>
<body>

<div class="container">

    <div class="header">
        <h1>🎓 Student Management</h1>
        <p>University ERP Student Module</p>
    </div>

    <!-- Student Form -->

    <div class="form-card">

        <h2>Add / Update Student</h2>

        <input type="hidden" id="studentId">

        <div class="form-grid">

            <div>
                <label>Enrollment No</label>
                <input
                        type="text"
                        id="enrollmentNo"
                        placeholder="Enter Enrollment Number">
            </div>

            <div>
                <label>Student Name</label>
                <input
                        type="text"
                        id="name"
                        placeholder="Enter Student Name">
            </div>

            <div>
                <label>Email</label>
                <input
                        type="email"
                        id="email"
                        placeholder="Enter Email">
            </div>

            <div>
                <label>Mobile Number</label>
                <input
                        type="text"
                        id="phone"
                        placeholder="Enter Mobile Number">
            </div>

            <div>
                <label>Course</label>

                <select id="course">

                    <option value="">
                        Select Course
                    </option>

                    <option>
                        Diploma Computer Science Engineering
                    </option>

                    <option>
                        Diploma Mechanical Engineering
                    </option>

                    <option>
                        Diploma Electrical Engineering
                    </option>

                    <option>
                        Diploma Civil Engineering
                    </option>

                </select>

            </div>

            <div>
                <label>Semester</label>

                <select id="semester">

                    <option value="">
                        Select Semester
                    </option>

                    <option>SEM 1</option>
                    <option>SEM 2</option>
                    <option>SEM 3</option>
                    <option>SEM 4</option>
                    <option>SEM 5</option>
                    <option>SEM 6</option>

                </select>

            </div>

            <div>
                <label>Student Photo URL</label>

                <input
                        type="text"
                        id="photo"
                        placeholder="Paste Photo URL">
            </div>

            <div class="photo-preview">

                <img
                        id="photoPreview"
                        src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                        alt="Student Photo">

            </div>

        </div>

        <div class="button-group">

            <button
                    class="save-btn"
                    onclick="saveStudent()">

                Save Student

            </button>

            <button
                    class="clear-btn"
                    onclick="clearForm()">

                Clear

            </button>

        </div>

    </div>

    <!-- Search -->

    <div class="search-card">

        <input
                type="text"
                id="search"
                placeholder="🔍 Search Enrollment No"
                onkeyup="loadStudents()">

    </div>

    <!-- Student Table -->

    <div class="table-card">

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Photo</th>

                <th>Enrollment No</th>

                <th>Name</th>

                <th>Email</th>

                <th>Mobile</th>

                <th>Course</th>

                <th>Semester</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>

    <!-- Dashboard Button -->

    <div class="footer-btn">

        <button
                onclick="window.location.href='dashboard.html'"
                class="dashboard-btn">

            ⬅ Back To Dashboard

        </button>

    </div>

</div>

<script>

    let selectedStudentId = null;

    window.onload = function () {
        loadStudents();

        document.getElementById("searchInput")
            .addEventListener("keyup", loadStudents);

        document.getElementById("photo")
            .addEventListener("change", previewPhoto);
    };

    function previewPhoto(event){

        let reader = new FileReader();

        reader.onload = function(){

            document.getElementById("preview")
                .src = reader.result;
        };

        reader.readAsDataURL(
            event.target.files[0]
        );
    }

    function saveStudent(){

        let student = {

            enrollmentNo:
            document.getElementById("enrollmentNo").value,

            name:
            document.getElementById("name").value,

            email:
            document.getElementById("email").value,

            phone:
            document.getElementById("phone").value,

            course:
            document.getElementById("course").value,

            semester:
            document.getElementById("semester").value,

            photo:
            document.getElementById("preview").src
        };

        if(
            student.enrollmentNo === "" ||
            student.name === ""
        ){
            alert("Please fill required fields");
            return;
        }

        let url = "/students";
        let method = "POST";

        if(selectedStudentId != null){
            url = "/students/" + selectedStudentId;
            method = "PUT";
        }

        fetch(url,{
            method:method,
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(student)
        })
            .then(res => res.text())
            .then(msg => {

                alert(msg);

                clearForm();

                loadStudents();
            });
    }

    function loadStudents(){

        let search =
            document.getElementById("searchInput")
                .value
                .toLowerCase();

        fetch("/students")
            .then(res => res.json())
            .then(data => {

                let rows = "";

                data.forEach(student => {

                    if(
                        search !== "" &&
                        !student.enrollmentNo
                            .toLowerCase()
                            .includes(search) &&
                        !student.name
                            .toLowerCase()
                            .includes(search)
                    ){
                        return;
                    }

                    rows += `
                <tr>

                    <td>
                        <img
                        class="student-img"
                        src="${student.photo || 'https://via.placeholder.com/50'}">
                    </td>

                    <td>${student.enrollmentNo}</td>

                    <td>${student.name}</td>

                    <td>${student.course}</td>

                    <td>${student.semester}</td>

                    <td>${student.phone}</td>

                    <td>

                        <button
                        class="edit-btn"
                        onclick="editStudent(${student.id})">
                        Edit
                        </button>

                        <button
                        class="delete-btn"
                        onclick="deleteStudent(${student.id})">
                        Delete
                        </button>

                    </td>

                </tr>
                `;
                });

                document.getElementById("studentTable")
                    .innerHTML = rows;
            });
    }

    function editStudent(id){

        fetch("/students")
            .then(res => res.json())
            .then(data => {

                let student =
                    data.find(
                        s => s.id === id
                    );

                if(student){

                    selectedStudentId = id;

                    document.getElementById("enrollmentNo")
                        .value = student.enrollmentNo;

                    document.getElementById("name")
                        .value = student.name;

                    document.getElementById("email")
                        .value = student.email;

                    document.getElementById("phone")
                        .value = student.phone;

                    document.getElementById("course")
                        .value = student.course;

                    document.getElementById("semester")
                        .value = student.semester;

                    document.getElementById("preview")
                        .src = student.photo;
                }
            });
    }

    function deleteStudent(id){

        if(
            !confirm(
                "Delete this student?"
            )
        ){
            return;
        }

        fetch("/students/" + id,{
            method:"DELETE"
        })
            .then(res => res.text())
            .then(msg => {

                alert(msg);

                loadStudents();
            });
    }

    function clearForm(){

        selectedStudentId = null;

        document.getElementById("enrollmentNo")
            .value = "";

        document.getElementById("name")
            .value = "";

        document.getElementById("email")
            .value = "";

        document.getElementById("phone")
            .value = "";

        document.getElementById("course")
            .value = "";

        document.getElementById("semester")
            .value = "";

        document.getElementById("photo")
            .value = "";

        document.getElementById("preview")
            .src =
            "https://via.placeholder.com/120";
    }

    function goDashboard(){

        window.location.href =
            "dashboard.html";
    }

</script>

</body>
</html>

</body>
</html>
