<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .header{
            background:linear-gradient(135deg,#00c853,#43a047);
            color:white;
            text-align:center;
            padding:30px;
        }

        .container{
            padding:25px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .card h3{
            color:#666;
            margin-bottom:10px;
        }

        .card h1{
            color:#00c853;
        }

        .profile{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            margin-bottom:25px;
        }

        .profile h2{
            margin-bottom:15px;
        }

        .menu{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .menu-card{
            background:white;
            padding:25px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            transition:.3s;
        }

        .menu-card:hover{
            transform:translateY(-5px);
        }

        .menu-card a{
            text-decoration:none;
            color:#00c853;
            font-weight:bold;
        }

        .logout{
            background:red;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>Employee Dashboard</h1>
    <h3 id="welcome"></h3>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h3>Attendance</h3>
            <h1>96%</h1>
        </div>

        <div class="card">
            <h3>Department</h3>
            <h1>IT</h1>
        </div>

        <div class="card">
            <h3>Designation</h3>
            <h1>Professor</h1>
        </div>

        <div class="card">
            <h3>Status</h3>
            <h1>Active</h1>
        </div>

    </div>

    <div class="profile">

        <h2>My Profile</h2>

        <p><b>Employee ID:</b> <span id="username"></span></p>
        <p><b>Role:</b> Employee</p>
        <p><b>Department:</b> Information Technology</p>

    </div>

    <div class="menu">

        <div class="menu-card">
            <a href="profile.html">My Profile</a>
        </div>

        <div class="menu-card">
            <a href="attendance.html">Attendance</a>
        </div>

        <div class="menu-card">
            <a href="reports.html">Reports</a>
        </div>

        <div class="menu-card">
            <a href="employee.html">Employee Details</a>
        </div>

    </div>

    <button class="logout" onclick="logout()">
        Logout
    </button>

</div>

<script>

    let username = localStorage.getItem("username");

    document.getElementById("welcome").innerHTML =
        "Welcome " + username;

    document.getElementById("username").innerHTML =
        username;

    function logout(){

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

</body>
</html>
